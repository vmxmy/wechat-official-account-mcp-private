schema: spec-driven

context: |
  Project: wechat-official-account-mcp
  WeChat Official Account MCP server (16 tools: auth, media, drafts, publish,
  users, tags, menu, template/customer-service/subscribe messages, statistics,
  auto-reply, mass-send, inbound inbox). Consumed by AI clients over standard
  MCP Streamable HTTP at Cloudflare Workers `/mcp` with OAuth.

  Current stack: TypeScript 5.8 (ES Modules, .js import extensions mandatory),
  @modelcontextprotocol/sdk v1.29, Cloudflare Workers + Agents SDK McpAgent,
  D1/R2/Durable Objects, Workers fetch/Web FormData/Uint8Array, Express only as
  a non-MCP local/API scaffold, Zod, crypto-js AES, React/Vite frontend scaffold.

  Runtime stance: HTTP-only. Local desktop stdio/CLI, MCP-over-SSE, native
  sqlite3, axios/Node form-data, Node forward proxy, and local filePath media
  upload implementations have been removed.

  Conventions: kebab-case files, no @/ path alias in backend tsc code (use
  relative paths), tool handlers receive (params, apiClient) and return
  WechatToolResult { content: [...] }.
