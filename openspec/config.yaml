schema: spec-driven

context: |
  Project: wechat-official-account-mcp
  WeChat Official Account MCP server (15 tools: auth, media, drafts, publish,
  users, tags, menu, template/customer-service/subscribe messages, statistics,
  auto-reply, mass-send). Consumed by AI clients over stdio (npm package) and
  REST (Express).

  Current stack: Node.js 18+, TypeScript 5.8 (ES Modules, .js import extensions
  mandatory), @modelcontextprotocol/sdk v1, sqlite3 (native), axios + Node
  form-data, Express, Zod, crypto-js AES. React 18 + Vite frontend scaffold
  (nearly empty).

  Goal: migrate the remote/HTTP surface to Cloudflare Workers using the official
  Agents SDK McpAgent + Durable Object pattern, keeping the local stdio npm
  package working. Core blockers to resolve: sqlite3 native module -> D1,
  axios/Node FormData -> fetch/Web FormData/Uint8Array, in-memory token lock ->
  shared Durable Object singleton.

  Conventions: kebab-case files, no @/ path alias in backend tsc code (use
  relative paths), tool handlers receive (params, apiClient) and return
  WechatToolResult { content: [...] }.

