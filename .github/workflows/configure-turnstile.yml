name: Configure Turnstile

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: turnstile-production
  cancel-in-progress: false

jobs:
  configure:
    name: Create widget and set Worker secret
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: production
      url: https://woa.ziikoo.app
    env:
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_TURNSTILE_API_TOKEN: ${{ secrets.CLOUDFLARE_TURNSTILE_API_TOKEN }}
      TURNSTILE_WIDGET_NAME: WOA production login
      TURNSTILE_WIDGET_DOMAIN: woa.ziikoo.app
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check Cloudflare credentials
        run: |
          missing=()
          [ -n "$CLOUDFLARE_ACCOUNT_ID" ] || missing+=(CLOUDFLARE_ACCOUNT_ID)
          [ -n "$CLOUDFLARE_API_TOKEN" ] || missing+=(CLOUDFLARE_API_TOKEN)
          [ -n "$CLOUDFLARE_TURNSTILE_API_TOKEN" ] || missing+=(CLOUDFLARE_TURNSTILE_API_TOKEN)
          if [ "${#missing[@]}" -gt 0 ]; then
            echo "::error::Missing required Turnstile secrets: ${missing[*]}"
            exit 1
          fi

      - name: Configure Turnstile
        run: node scripts/ops/configure-turnstile.mjs
