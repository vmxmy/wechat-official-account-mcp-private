name: Configure Turnstile

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  configure:
    name: Create widget and set Worker secret
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      TURNSTILE_WIDGET_NAME: WOA production login
      TURNSTILE_WIDGET_DOMAIN: woa.ziikoo.app
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Configure Turnstile
        run: node scripts/ops/configure-turnstile.mjs
