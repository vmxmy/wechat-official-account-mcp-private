name: Deploy production Worker

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: production-worker
  cancel-in-progress: false

jobs:
  deploy:
    name: Build, test, migrate, deploy
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment:
      name: production
      url: https://woa.ziikoo.app
    env:
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      VITE_TURNSTILE_SITE_KEY: ${{ secrets.VITE_TURNSTILE_SITE_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Require verified CLI latest before public deployment
        run: |
          expected_version="$(node -p "require('./package.json').version")"
          latest_version="$(npm view @ziikoo/woa@latest version --registry=https://registry.npmjs.org)"
          if [ "$latest_version" != "$expected_version" ]; then
            echo "::error::Public deployment requires @ziikoo/woa@latest=$expected_version; registry currently resolves to ${latest_version:-nothing}. Publish and verify the exact version on next, then promote that same version to latest."
            exit 1
          fi
          installed_version="$(npx -y --registry=https://registry.npmjs.org --package "@ziikoo/woa@$expected_version" woa --version)"
          if [ "$installed_version" != "$expected_version" ]; then
            echo "::error::Registry CLI reported $installed_version; expected $expected_version"
            exit 1
          fi
          npx -y --registry=https://registry.npmjs.org --package "@ziikoo/woa@$expected_version" woa help agent --format json > /tmp/woa-agent-help.json
          EXPECTED_VERSION="$expected_version" node -e "const fs=require('node:fs'); const value=JSON.parse(fs.readFileSync('/tmp/woa-agent-help.json','utf8')); if (value.cliVersion !== process.env.EXPECTED_VERSION || value.entrypoint?.args?.[0] !== 'init') process.exit(1);"

      - name: Type check
        run: npm run check

      - name: Test
        run: npm test

      - name: Lint
        run: npm run lint

      - name: Check Cloudflare CI credentials
        run: |
          missing=()
          [ -n "$CLOUDFLARE_ACCOUNT_ID" ] || missing+=(CLOUDFLARE_ACCOUNT_ID)
          [ -n "$CLOUDFLARE_API_TOKEN" ] || missing+=(CLOUDFLARE_API_TOKEN)
          [ -n "$VITE_TURNSTILE_SITE_KEY" ] || missing+=(VITE_TURNSTILE_SITE_KEY)
          if [ "${#missing[@]}" -gt 0 ]; then
            echo "::error::Missing required production secrets: ${missing[*]}"
            exit 1
          fi

      - name: Validate Worker bundle before remote changes
        run: npx wrangler deploy --dry-run --minify --keep-vars

      - name: Apply D1 migrations
        run: npx wrangler d1 migrations apply wechat-official-account-mcp-prod --remote

      - name: Deploy Worker
        run: npx wrangler deploy --minify --keep-vars

      - name: Verify production health and MCP auth boundary
        run: |
          health="$(curl --fail --silent --show-error --retry 5 --retry-all-errors https://woa.ziikoo.app/health)"
          node -e "const value=JSON.parse(process.argv[1]); if (value.success !== true || value.runtime !== 'cloudflare-workers' || value.mcpEndpoint !== '/mcp') process.exit(1)" "$health"
          status="$(curl --silent --output /dev/null --write-out '%{http_code}' https://woa.ziikoo.app/mcp)"
          if [ "$status" != "401" ]; then
            echo "::error::Expected unauthenticated /mcp to return 401, got $status"
            exit 1
          fi
