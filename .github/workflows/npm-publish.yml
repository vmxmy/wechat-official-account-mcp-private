name: Publish npm CLI

on:
  workflow_dispatch:
    inputs:
      tag:
        description: npm dist-tag to publish
        required: true
        default: latest
        type: choice
        options:
          - latest
          - next
  push:
    tags:
      - 'woa-v*'

permissions:
  contents: read
  id-token: write

concurrency:
  group: npm-publish-woa
  cancel-in-progress: false

jobs:
  publish:
    name: Build, verify, and publish @ziikoo/woa
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment:
      name: npm-release
      url: https://www.npmjs.com/package/@ziikoo/woa
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org/

      - name: Install release npm CLI
        run: npm install --global npm@12.0.1

      - name: Verify npm automation token
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -z "${NODE_AUTH_TOKEN:-}" ]; then
            echo '::error::NPM_TOKEN is required to publish @ziikoo/woa.'
            exit 1
          fi
          npm whoami --registry=https://registry.npmjs.org/

      - name: Validate release ref and package version
        id: release
        env:
          REQUESTED_DIST_TAG: ${{ github.event.inputs.tag || 'latest' }}
        run: |
          package_name="$(node -p "require('./package.json').name")"
          package_version="$(node -p "require('./package.json').version")"
          if [ "$GITHUB_EVENT_NAME" = "push" ]; then
            expected_tag="woa-v${package_version}"
            if [ "$GITHUB_REF_NAME" != "$expected_tag" ]; then
              echo "::error::Release tag $GITHUB_REF_NAME does not match package version $package_version; expected $expected_tag"
              exit 1
            fi
            git fetch origin main
            if ! git merge-base --is-ancestor "$GITHUB_SHA" origin/main; then
              echo "::error::Release tag must point to a commit reachable from origin/main"
              exit 1
            fi
          elif [ "$GITHUB_REF" != "refs/heads/main" ]; then
            echo "::error::Manual npm releases must run from the main branch"
            exit 1
          fi
          echo "package_name=$package_name" >> "$GITHUB_OUTPUT"
          echo "package_version=$package_version" >> "$GITHUB_OUTPUT"
          echo "dist_tag=$REQUESTED_DIST_TAG" >> "$GITHUB_OUTPUT"

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run check

      - name: Lint
        run: npm run lint

      - name: Test and production build
        run: npm test

      - name: Verify package identity
        id: package
        run: |
          node -e "const p=require('./package.json'); if (p.name !== '@ziikoo/woa') throw new Error('Unexpected package name: '+p.name); if (p.bin?.woa !== 'dist/src/cli/woa.js') throw new Error('woa bin missing');"
          npm pack --json > /tmp/woa-pack.json
          node - <<'NODE' >> "$GITHUB_OUTPUT"
          const packResult = JSON.parse(require('node:fs').readFileSync('/tmp/woa-pack.json', 'utf8'));
          const item = Array.isArray(packResult)
            ? packResult[0]
            : packResult['@ziikoo/woa'] ?? Object.values(packResult)[0];
          if (!item) {
            throw new Error('npm pack --json returned no package metadata');
          }
          if (!item.files.some(file => file.path === 'dist/src/cli/woa.js')) {
            throw new Error('Published tarball would not contain dist/src/cli/woa.js');
          }
          console.log(`local_shasum=${item.shasum}`);
          console.log(`local_tarball=${item.filename}`);
          NODE

      - name: Check registry version and dist-tag
        id: registry
        env:
          PACKAGE_NAME: ${{ steps.release.outputs.package_name }}
          PACKAGE_VERSION: ${{ steps.release.outputs.package_version }}
          DIST_TAG: ${{ steps.release.outputs.dist_tag }}
          LOCAL_SHASUM: ${{ steps.package.outputs.local_shasum }}
          LOCAL_TARBALL: ${{ steps.package.outputs.local_tarball }}
        run: |
          registry_metadata="$(mktemp)"
          node --input-type=module - <<'NODE' > "$registry_metadata"
          const packageUrl = `https://registry.npmjs.org/${encodeURIComponent(process.env.PACKAGE_NAME)}`;
          let lastError;
          for (let attempt = 1; attempt <= 5; attempt += 1) {
            try {
              const response = await fetch(packageUrl, { signal: AbortSignal.timeout(15000) });
              if (response.status === 404) {
                process.stdout.write(JSON.stringify({ exists: false }));
                process.exit(0);
              }
              if (!response.ok) throw new Error(`npm registry returned ${response.status}`);
              const metadata = await response.json();
              const versionMetadata = metadata.versions?.[process.env.PACKAGE_VERSION];
              process.stdout.write(JSON.stringify({
                exists: Boolean(versionMetadata),
                shasum: versionMetadata?.dist?.shasum ?? '',
                tarball: versionMetadata?.dist?.tarball ?? '',
                taggedVersion: metadata['dist-tags']?.[process.env.DIST_TAG] ?? '',
                nextVersion: metadata['dist-tags']?.next ?? '',
              }));
              process.exit(0);
            } catch (error) {
              lastError = error;
              if (attempt < 5) await new Promise(resolve => setTimeout(resolve, attempt * 1000));
            }
          }
          throw lastError;
          NODE
          registry_field() {
            REGISTRY_METADATA="$registry_metadata" REGISTRY_FIELD="$1" node -e "const value=JSON.parse(require('node:fs').readFileSync(process.env.REGISTRY_METADATA, 'utf8'))[process.env.REGISTRY_FIELD]; process.stdout.write(String(value ?? ''));"
          }
          if [ "$(registry_field exists)" != "true" ]; then
            if [ "$DIST_TAG" = "latest" ]; then
              echo "::error::$PACKAGE_NAME@$PACKAGE_VERSION must be published and verified on dist-tag next before it can be promoted to latest"
              exit 1
            fi
            echo "should_publish=true" >> "$GITHUB_OUTPUT"
            echo "should_promote=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          remote_shasum="$(registry_field shasum)"
          remote_tarball="$(registry_field tarball)"
          tagged_version="$(registry_field taggedVersion)"
          if [ "$remote_shasum" != "$LOCAL_SHASUM" ]; then
            if [ -z "$remote_tarball" ] || [ ! -f "$LOCAL_TARBALL" ]; then
              echo "::error::Unable to compare package contents after tarball shasum mismatch"
              exit 1
            fi
            compare_dir="$(mktemp -d)"
            mkdir -p "$compare_dir/local" "$compare_dir/remote"
            curl --fail --silent --show-error --location --retry 5 --retry-all-errors --connect-timeout 10 --max-time 60 "$remote_tarball" --output "$compare_dir/remote.tgz"
            tar -xzf "$LOCAL_TARBALL" -C "$compare_dir/local" --strip-components=1
            tar -xzf "$compare_dir/remote.tgz" -C "$compare_dir/remote" --strip-components=1
            if ! diff --recursive --brief --no-dereference "$compare_dir/local" "$compare_dir/remote"; then
              echo "::error::$PACKAGE_NAME@$PACKAGE_VERSION already exists with different package contents"
              exit 1
            fi
            echo "::notice::Tarball archive shasums differ across build environments, but extracted package contents match"
            rm -rf "$compare_dir"
          fi
          if [ "$tagged_version" != "$PACKAGE_VERSION" ]; then
            if [ "$DIST_TAG" = "latest" ]; then
              next_version="$(registry_field nextVersion)"
              if [ "$next_version" != "$PACKAGE_VERSION" ]; then
                echo "::error::$PACKAGE_NAME@$PACKAGE_VERSION is not the exact version currently verified on dist-tag next (found ${next_version:-nothing})"
                exit 1
              fi
            fi
            echo "should_publish=false" >> "$GITHUB_OUTPUT"
            echo "should_promote=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "::notice::$PACKAGE_NAME@$PACKAGE_VERSION is already published with the expected tarball and dist-tag; skipping publish"
          echo "should_publish=false" >> "$GITHUB_OUTPUT"
          echo "should_promote=false" >> "$GITHUB_OUTPUT"

      - name: Publish with npm automation token
        if: steps.registry.outputs.should_publish == 'true'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: 'true'
        run: npm publish --access public --provenance --tag "${{ steps.release.outputs.dist_tag }}"

      - name: Promote verified exact version
        if: steps.registry.outputs.should_promote == 'true'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          PACKAGE_NAME: ${{ steps.release.outputs.package_name }}
          PACKAGE_VERSION: ${{ steps.release.outputs.package_version }}
          DIST_TAG: ${{ steps.release.outputs.dist_tag }}
        run: npm dist-tag add "$PACKAGE_NAME@$PACKAGE_VERSION" "$DIST_TAG"

      - name: Verify registry publication
        env:
          PACKAGE_NAME: ${{ steps.release.outputs.package_name }}
          PACKAGE_VERSION: ${{ steps.release.outputs.package_version }}
          DIST_TAG: ${{ steps.release.outputs.dist_tag }}
        run: |
          node --input-type=module - <<'NODE'
          const packageUrl = `https://registry.npmjs.org/${encodeURIComponent(process.env.PACKAGE_NAME)}`;
          let lastVersion = '';
          for (let attempt = 1; attempt <= 5; attempt += 1) {
            try {
              const response = await fetch(`${packageUrl}?cacheBust=${Date.now()}`, {
                signal: AbortSignal.timeout(15000),
                cache: 'no-store',
              });
              if (!response.ok) throw new Error(`npm registry returned ${response.status}`);
              const metadata = await response.json();
              lastVersion = metadata['dist-tags']?.[process.env.DIST_TAG] ?? '';
              if (lastVersion === process.env.PACKAGE_VERSION) process.exit(0);
            } catch (error) {
              if (attempt === 5) throw error;
            }
            await new Promise(resolve => setTimeout(resolve, attempt * 2000));
          }
          throw new Error(`Registry dist-tag ${process.env.DIST_TAG} resolved to ${lastVersion || 'nothing'}, expected ${process.env.PACKAGE_VERSION}`);
          NODE
